name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Skip postinstall that fetches binaries (known hang risk)
  SKIP_POSTINSTALL: "1"

jobs:
  # Stage 1: verify environment BEFORE installing anything
  verify:
    name: Verify environment
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Show repo state
        run: |
          echo "::group::repo info"
          git log -1 --oneline || true
          git status --short || true
          echo "::endgroup::"

      - name: Verify required files
        run: |
          test -f package.json      || { echo "::error::package.json missing"; exit 1; }
          test -f tsconfig.json     || { echo "::error::tsconfig.json missing"; exit 1; }
          test -d src               || { echo "::error::src/ missing"; exit 1; }
          echo "required files present"

      - name: Verify scripts
        run: |
          test -x scripts/diagnose.sh || chmod +x scripts/diagnose.sh
          bash -n scripts/diagnose.sh && bash -n scripts/pre-commit.sh && bash -n scripts/cron-daily.sh
          echo "scripts syntactically valid"

  # Stage 2: install with cache, no postinstall hang
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 4
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.14"

      # Explicit verification BEFORE installing
      - name: Verify bun works
        run: |
          bun --version
          node --version

      # Cache bun install
      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json', '**/bun.lockb', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Install with postinstall skipped (binary fetch is broken)
      - name: Install (skip postinstall)
        run: |
          echo "Installing with SKIP_POSTINSTALL=1 (binary fetch is broken)"
          SKIP_POSTINSTALL=1 bun install

      - name: Verify install
        run: |
          test -d node_modules || { echo "::error::node_modules missing"; exit 1; }
          test -f node_modules/.bin/tsc || test -f node_modules/.bin/tsgo \
            || { echo "::error::no TypeScript compiler installed"; exit 1; }
          echo "install verified"

  # Stage 3: type check (separate, fast feedback)
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    timeout-minutes: 4
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json', '**/bun.lockb', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Run TSC
        run: |
          if [ -x node_modules/.bin/tsgo ]; then
            node_modules/.bin/tsgo -p tsconfig.json --noEmit
          elif [ -x node_modules/.bin/tsc ]; then
            node_modules/.bin/tsc -p tsconfig.json --noEmit
          else
            npx --yes tsc -p tsconfig.json --noEmit
          fi

  # Stage 4: lint
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 4
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json', '**/bun.lockb', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Run biome
        run: |
          if [ -x node_modules/.bin/biome ]; then
            node_modules/.bin/biome lint .
          else
            echo "::warning::biome not installed, skipping"
          fi

  # Stage 5: build (expects to fail until TSC errors are fixed)
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [install, typecheck, lint]
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.14"

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json', '**/bun.lockb', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Build
        run: |
          echo "Building (may fail until TSC errors resolved)"
          SKIP_POSTINSTALL=1 bun run build || {
            echo "::error::build failed — see logs"
            exit 1
          }

      - name: Verify dist
        run: |
          test -d dist || { echo "::error::dist/ missing"; exit 1; }
          COUNT=$(find dist -type f | wc -l)
          echo "dist contains $COUNT files"
          [ "$COUNT" -gt 0 ] || { echo "::error::dist/ empty"; exit 1; }

  # Stage 6: test (independent)
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: install
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json', '**/bun.lockb', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Run tests
        run: |
          if [ -d test ] || [ -d tests ] || [ -d src ]; then
            SKIP_POSTINSTALL=1 bun test --bail=10 || echo "::warning::tests failed (non-blocking)"
          else
            echo "no test directory found — skipping"
          fi

  # Stage 7: self-diagnose (runs the diagnostic script)
  diagnose:
    name: Self-diagnose
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: install
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json', '**/bun.lockb', '**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Run diagnose.sh
        run: |
          chmod +x scripts/diagnose.sh
          bash scripts/diagnose.sh || echo "::warning::diagnose reported issues (non-blocking)"

      - name: Upload diagnose log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnose-report
          path: |
            diagnose-*.log
          retention-days: 7
          if-no-files-found: ignore

  # Final gate
  all-checks:
    name: All checks summary
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [verify, install, typecheck, lint, build, test, diagnose]
    if: always()
    steps:
      - name: Report
        run: |
          echo "## CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| verify | ${{ needs.verify.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| install | ${{ needs.install.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| typecheck | ${{ needs.typecheck.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| lint | ${{ needs.lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| test | ${{ needs.test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| diagnose | ${{ needs.diagnose.result }} |" >> "$GITHUB_STEP_SUMMARY"

          # Fail if any required stage failed
          if [ "${{ needs.verify.result }}" = "failure" ] || \
             [ "${{ needs.install.result }}" = "failure" ] || \
             [ "${{ needs.typecheck.result }}" = "failure" ] || \
             [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ]; then
            echo "::error::one or more required checks failed"
            exit 1
          fi
          echo "all required checks passed"