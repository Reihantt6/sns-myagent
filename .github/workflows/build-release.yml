name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: snscoder-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            artifact: snscoder-linux-arm64
          - os: macos-latest
            target: macos-x64
            artifact: snscoder-macos-x64
          - os: macos-latest
            target: macos-arm64
            artifact: snscoder-macos-arm64
          - os: windows-latest
            target: windows-x64
            artifact: snscoder-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Build binary
        shell: bash
        env:
          FLAGS: --compile --target=bun --define process.env.PI_COMPILED='"true"' --define process.env.PKG_VERSION='"${{ github.ref_name }}"' --no-compile-autoload-bunfig --no-compile-autoload-dotenv --no-compile-autoload-tsconfig --no-compile-autoload-package-json --keep-names
        run: bun build $FLAGS --outfile bin/${{ matrix.artifact }} ./src/cli/entry.ts

      - name: Test binary exists
        shell: bash
        run: |
          ls -la bin/${{ matrix.artifact }}
          if [ -f bin/${{ matrix.artifact }} ]; then echo "✓ Binary exists"; else echo "✗ Missing"; exit 1; fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/snscoder-linux-x64/snscoder-linux-x64
            artifacts/snscoder-linux-arm64/snscoder-linux-arm64
            artifacts/snscoder-macos-x64/snscoder-macos-x64
            artifacts/snscoder-macos-arm64/snscoder-macos-arm64
            artifacts/snscoder-windows-x64.exe/snscoder-windows-x64.exe
